<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Finance Tracker</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
   <!-- CSS -->
  <link rel="stylesheet" href="./styles/styles.css">
</head>

<body class="bg-dark text-white">

<div class="container py-4">

  <!-- Header -->
  <h1 class="text-center mb-4">💰 Finance Tracker</h1>

  <!-- Cards -->
  <div class="row text-center mb-4">
    <div class="col-md-4">
      <div class="card bg-secondary p-3">
        <h5>Balance</h5>
        <h3>$0</h3>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card bg-success p-3">
        <h5>Income</h5>
        <h3>$0</h3>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card bg-danger p-3">
        <h5>Expenses</h5>
        <h3>$0</h3>
      </div>
    </div>
  </div>

  <!-- Form -->
  <div class="card bg-secondary p-3 mb-4">
    <h5>Add Transaction</h5>

    <input type="text" class="form-control mb-2" placeholder="Description">

    <input type="number" class="form-control mb-2" placeholder="Amount">

    <select class="form-control mb-2">
      <option>Income</option>
      <option>Expense</option>
    </select>

    <button class="btn btn-primary w-100">Add</button>
  </div>

  <!-- Table -->
  <table class="table table-dark table-striped">
    <thead>
      <tr>
        <th>Type</th>
        <th>Description</th>
        <th>Amount</th>
      </tr>
    </thead>
    <tbody>
      <!-- Movimientos -->
    </tbody>
  </table>

</div>
  <script src="./js/script.js"></script>
</body>
</html>
