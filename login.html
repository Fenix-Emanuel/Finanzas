<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Login | Finanzas</title>

  <link rel="stylesheet" href="./styles/login.css" />
</head>
<body>

  <main class="auth-page">
    <section class="auth-card">

      <div class="auth-header">
        <h1>FINANZAS 💰</h1>
        <p id="form-subtitle">Welcome back</p>
      </div>

      <form id="auth-form">
        <div class="input-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Enter your email" required />
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required />
        </div>

        <p id="auth-message"></p>

        <button type="submit" id="auth-button">Login</button>
      </form>

      <div class="auth-footer">
        <p id="toggle-text">Don't have an account?</p>
        <button id="toggle-auth" type="button">Create account</button>
      </div>

    </section>
  </main>

  <script type="module" src="./js/auth.js"></script>
</body>
</html>
